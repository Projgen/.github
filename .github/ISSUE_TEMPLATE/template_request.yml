name: 🧩 Template Request
description: Request a new stack preset / template for Projgen
labels: ["template", "enhancement"]
body:
  - type: input
    id: template_name
    attributes:
      label: Template Name
      description: A short, descriptive slug for the template.
      placeholder: "vue-pinia-vitest"
    validations:
      required: true

  - type: textarea
    id: stack
    attributes:
      label: Stack Definition
      description: List all the tools/frameworks/libraries and other steps this template should include.
      placeholder: |
        - Framework: Vue 3 (Vite)
        - State: Pinia
        - Testing: Vitest + Vue Test Utils
        - Styling: Tailwind CSS
        - Linting: ESLint + Prettier
        - Git: init with .gitignore
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Who is this template for? What kind of project does it scaffold?
      placeholder: "For Vue 3 SPAs that need a solid testing and state management setup from day one."
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any variables or special steps needed?
    validations:
      required: false

  - type: checkboxes
    id: willing_to_pr
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this template
          required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing issues and this template doesn't exist yet
          required: true
