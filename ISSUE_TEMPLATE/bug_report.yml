name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below as completely as possible.

  - type: input
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "Running `projgen` with Next.js + Supabase crashes after the database prompt."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run `npx projgen`
        2. Select "Next.js"
        3. Select "Supabase"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Output
      description: Paste the full terminal output / error message here.
      render: shell
    validations:
      required: false

  - type: input
    id: projgen_version
    attributes:
      label: Projgen Version
      placeholder: "0.0.1-beta"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: package_manager
    attributes:
      label: Package Manager
      placeholder: "pnpm 10.9.0 / npm 10.x / yarn 4.x"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of Projgen
          required: false
